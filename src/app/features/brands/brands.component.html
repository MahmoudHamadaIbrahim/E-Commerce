<section class="bg-linear-to-r from-green-start to-green-end py-16 text-white">
    <div class="container mx-auto px-4">
        <nav class="flex items-center gap-2 text-sm text-green-50/80 mb-6">
            <a routerLink="/home" class="hover:text-white transition-colors">Home</a>
            <span>/</span>
            <span class="text-white font-medium">Brands</span>
        </nav>

        <div class="flex items-center gap-6">
            <div
                class="flex h-16 w-16 items-center justify-center rounded-2xl bg-white/20 backdrop-blur-md shadow-inner">
                <i class="fas fa-layer-group text-4xl"></i>
            </div>

            <div>
                <h1 class="text-4xl font-bold tracking-tight">All Brands</h1>
                <p class="mt-1 text-lg text-green-50 opacity-90">Browse our wide range of product brands</p>
            </div>
        </div>
    </div>
</section>

<section class="py-12 bg-gray-50 min-h-screen">
    <div class="container">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            @for (brand of brandsList(); track brand._id) {
            <div
                class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-xl transition-all duration-300 group text-center cursor-pointer">

                <div class="relative mb-4 inline-block">
                    <img [src]="brand.image" [alt]="brand.name"
                        class="h-40 w-40 object-contain mx-auto transition-transform duration-500 group-hover:scale-105">
                </div>

                <h3 class="text-xl font-bold text-slate-800 transition-colors duration-300 group-hover:text-primary">
                    {{ brand.name }}
                </h3>

                <div [routerLink]="['/specificbrand', brand._id]"
                    class="mt-4 flex items-center justify-center gap-2 text-primary font-medium opacity-0 transition-all duration-500 group-hover:opacity-100">
                    <span class="text-sm">View Products</span>
                    <i
                        class="fas fa-chevron-right text-xs transition-transform duration-300 group-hover:translate-x-1"></i>
                </div>

            </div>
            }
        </div>
    </div>
</section>
