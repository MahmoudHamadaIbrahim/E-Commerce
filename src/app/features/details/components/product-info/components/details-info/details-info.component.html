<div class="space-y-8 animate-fade-in">
    <div>
        <h3 class="text-xl font-bold text-slate-800 mb-4">About this Product</h3>
        <p class="text-gray-500 leading-relaxed text-justify">
            {{ productDetails().description }}
        </p>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
        <app-product-info [productDetails]="productDetails()"></app-product-info>

        <div class="bg-gray-50/50 p-6 rounded-xl space-y-4">
            <h4 class="font-bold text-slate-800 border-b border-gray-200 pb-2">Key Features</h4>
            <ul class="space-y-3">
                <li class="flex items-center gap-3 text-sm text-gray-600 font-medium">
                    <i class="fas fa-check text-emerald-500"></i> Premium Quality Product
                </li>
                <li class="flex items-center gap-3 text-sm text-gray-600 font-medium">
                    <i class="fas fa-check text-emerald-500"></i> 100% Authentic Guarantee
                </li>
                <li class="flex items-center gap-3 text-sm text-gray-600 font-medium">
                    <i class="fas fa-check text-emerald-500"></i> Fast & Secure Packaging
                </li>
                <li class="flex items-center gap-3 text-sm text-gray-600 font-medium">
                    <i class="fas fa-check text-emerald-500"></i> Quality Tested
                </li>
            </ul>
        </div>
    </div>
</div>
