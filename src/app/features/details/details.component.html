<section class="p-4 md:p-8 ">
    <div class="container lg:max-w-5xl mx-auto">
        @if (productDetails().id) {
        <app-product-photos [productDetails]="productDetails()"></app-product-photos>
        }

        @if (productDetails().id) {
        <app-product-details [productDetails]="productDetails()"></app-product-details>
        }

        <div class="mt-12 bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm font-sans">
            <div class="flex border-b border-gray-100 bg-gray-50/50">
                <button (click)="setTab('details')"
                    [class]="activeTab() === 'details' ? 'bg-white border-t-2 border-emerald-500 text-emerald-600' : 'text-gray-500 hover:text-emerald-500'"
                    class="flex-1 py-4 px-6 flex items-center justify-center gap-2 font-bold transition-all duration-300 cursor-pointer">
                    <i class="fas fa-book-open text-sm"></i> Product Details
                </button>
                <button (click)="setTab('reviews')"
                    [class]="activeTab() === 'reviews' ? 'bg-white border-t-2 border-emerald-500 text-emerald-600' : 'text-gray-500 hover:text-emerald-500'"
                    class="flex-1 py-4 px-6 flex items-center justify-center gap-2 font-bold transition-all duration-300 cursor-pointer border-x border-gray-100">
                    <i class="fas fa-star text-sm"></i> Reviews ({{ productDetails().ratingsQuantity }})
                </button>
                <button (click)="setTab('shipping')"
                    [class]="activeTab() === 'shipping' ? 'bg-white border-t-2 border-emerald-500 text-emerald-600' : 'text-gray-500 hover:text-emerald-500'"
                    class="flex-1 py-4 px-6 flex items-center justify-center gap-2 font-bold transition-all duration-300 cursor-pointer">
                    <i class="fas fa-truck text-sm"></i> Shipping & Returns
                </button>
            </div>

            <div class="p-8">
                @if (activeTab() === 'details') {
                <app-details-info [productDetails]="productDetails()"></app-details-info>
                }

                @if (activeTab() === 'reviews') {
                <app-reviews [productDetails]="productDetails()"></app-reviews>
                }

                @if (activeTab() === 'shipping') {
                <app-shipping [productDetails]="productDetails()"></app-shipping>
                }
            </div>
        </div>

        <app-related-products [productDetails]="productDetails()"></app-related-products>
    </div>

</section>
