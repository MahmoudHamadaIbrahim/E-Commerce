<nav class="sticky top-0 z-40 w-full border-b border-gray-100 bg-white px-6 py-4 font-sans">
    <div class="container mx-auto flex items-center justify-between gap-4">
        <a routerLink="/" class="shrink-0">
            <img src="/assets/fresh-logo.svg" alt="FreshCart" class="h-7 md:h-8" />
        </a>

        <div class="hidden lg:block md:block grow max-w-md">
            <div class="group relative">
                <input type="text" placeholder="Search for products..."
                    class="w-full rounded-full border border-gray-200 bg-gray-50 px-6 py-2 pr-12 outline-none transition-all focus:border-emerald-500 focus:ring-emerald-500" />
                <button
                    class="absolute right-1 top-1 bottom-1 flex w-9 items-center justify-center rounded-full bg-emerald-600 text-white transition-colors hover:bg-emerald-700">
                    <i class="fas fa-search text-xs"></i>
                </button>
            </div>
        </div>

        <div class="hidden items-center gap-6 lg:flex">
            <a routerLink="/" routerLinkActive="text-primary" [routerLinkActiveOptions]="exactMatch"
                class="font-medium text-gray-700 transition-colors hover:text-emerald-600">Home</a>
            <a routerLink="/shop" routerLinkActive="text-primary"
                class="font-medium text-gray-700 transition-colors hover:text-emerald-600">Shop</a>
            <div class="group relative">
                <button
                    class="flex items-center gap-1 cursor-pointer py-2 font-medium text-gray-700 transition-colors ">
                    Categories
                    <i class="fas fa-chevron-down text-2xs transition-transform group-hover:rotate-180"></i>
                </button>
                <div
                    class="invisible absolute left-0 z-50 mt-0 w-48 rounded-lg border border-gray-100 bg-white opacity-0 shadow-xl transition-all duration-200 group-hover:visible group-hover:opacity-100">
                    <ul class="py-2 text-sm text-gray-700">
                        <li>
                            <a routerLink="/categories" cursor-pointer
                                class="block px-4 py-2 hover:text-emerald-600">All
                                Categories</a>
                        </li>
                    </ul>
                </div>
            </div>
            <a routerLink="/brands" routerLinkActive="text-primary"
                class="font-medium text-gray-700 transition-colors hover:text-emerald-600">Brands</a>
        </div>

        <div class="flex items-center gap-2 md:gap-4">

            <a routerlink="/contact"
                class="hidden md:flex items-center gap-2 text-gray-700 ltr:border-r rtl:border-l border-slate-200 px-3 hover:opacity-80 transition-opacity"
                href="/contact">
                <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600"><i
                        class="fas fa-headset"></i></div>
                <div class="hidden md:block lg:block">
                    <div class="text-xs text-gray-500">Support</div>
                    <div class="text-sm font-medium">24/7 Help</div>
                </div>
            </a>

            <button routerLink="/wishlist" routerLinkActive="text-primary"
                class="relative flex h-10 w-10 cursor-pointer items-center justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100">
                <i class="far fa-heart text-xl"></i>
                <span
                    class="absolute right-1 top-1 rounded-full border-2 border-white bg-red-500 px-1.5 text-2xs font-bold text-white">{{
                    wishCount() }}</span>
            </button>

            <button routerLink="/cart" routerLinkActive="text-primary"
                class="relative flex h-10 w-10 items-center cursor-pointer justify-center rounded-full text-gray-600 transition-all hover:bg-gray-100">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span
                    class="absolute right-1 top-1 rounded-full border-2 border-white bg-emerald-600 px-1.5 text-2xs font-bold text-white">{{
                    count() }}</span>
            </button>

            <div class="hidden lg:flex items-center gap-4 pl-4 border-l border-gray-200">
                @if (isLogged()) {
                <a (click)="logOut()" routerLinkActive="text-primary"
                    class="group flex cursor-pointer items-center hover:bg-red-50 gap-1 rounded-4xl p-1 px-3 transition-colors">
                    <div
                        class="flex h-11 w-11 items-center justify-center rounded-full bg-red-200 text-gray-600 transition-colors ">
                        <i class="fa-solid fa-arrow-right-from-bracket text-red-600"></i>
                    </div>
                    <span class="font-bold text-red-600 ">Sign Out</span>
                </a>
                }
                @else {
                <a routerLink="/login" routerLinkActive="text-primary"
                    class="group flex cursor-pointer hover:bg-emerald-50 items-center gap-1 rounded-4xl p-1 px-3 transition-colors">
                    <div
                        class="flex h-11 w-11 items-center justify-center rounded-full bg-primary text-white transition-colors ">
                        <i class="far fa-user text-lg"></i>
                    </div>
                    <span class="font-bold text-primary ">Sign In</span>
                </a>

                <a routerLink="/register" routerLinkActive="text-primary"
                    class="group flex cursor-pointer hover:bg-emerald-50 items-center gap-1 rounded-4xl p-1 px-3 transition-colors">
                    <div
                        class="flex h-11 w-11 items-center justify-center rounded-full bg-primary text-white transition-colors ">
                        <i class="fas fa-user-plus text-lg"></i>
                    </div>
                    <span class="font-bold text-primary ">Sign Up</span>
                </a>
                }
            </div>

            <button type="button" (click)="toggleDrawer()"
                class="cursor-pointer flex h-10 w-10 items-center justify-center rounded-full bg-emerald-600 text-white lg:hidden">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </div>
</nav>

<!-- --------------- navbar responsive ---------------- -->

<div [class.translate-x-0]="isDrawerOpen()" [class.translate-x-full]="!isDrawerOpen()"
    class="fixed top-0 right-0 z-100 h-screen w-80 bg-white p-6 shadow-2xl transition-transform duration-500 ease-in-out lg:hidden flex flex-col">

    <div class="mb-8 flex items-center justify-between">
        <img src="/assets/fresh-logo.svg" alt="Logo" class="h-7" />
        <button type="button" (click)="closeDrawer()" class="rounded-full bg-gray-100 p-2 text-gray-400">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div class="relative mb-8">

        <input type="text" placeholder="Search products..."
            class="w-full rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm outline-none focus:border-emerald-500 focus:ring-emerald-500" />

        <button class="absolute right-3 top-2.5 text-emerald-600"><i class="fas fa-search"></i></button>

    </div>

    <nav class="mb-1 border-b border-gray-100 p-4">
        <ul class="space-y-5 font-medium text-gray-800">
            <li><a routerLink="/" (click)="closeDrawer()" routerLinkActive="text-primary">Home</a></li>
            <li><a routerLink="/shop" (click)="closeDrawer()" routerLinkActive="text-primary">Shop</a></li>
            <li><a routerLink="/categories" (click)="closeDrawer()" routerLinkActive="text-primary">Categories</a></li>
            <li><a routerLink="/brands" (click)="closeDrawer()" routerLinkActive="text-primary">Brands</a></li>
        </ul>
    </nav>

    <div class="mb-2 space-y-2">
        <a routerLink="/wishlist" (click)="closeDrawer()"
            class="group flex items-center gap-2 p-2 rounded-xl hover:bg-red-50">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-red-50 text-red-500"><i
                    class="far fa-heart"></i></div>
            <span class="font-medium text-gray-700">Wishlist</span>
        </a>
        <a routerLink="/cart" (click)="closeDrawer()"
            class="group flex items-center gap-2 p-2 rounded-xl hover:bg-emerald-50">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-50 text-emerald-600"><i
                    class="fas fa-shopping-cart"></i></div>
            <span class="font-medium text-gray-700">My Cart</span>
        </a>
    </div>

    <div class="mt-4 border-t border-gray-100 pt-4">
        @if (isLogged()) {
        <button (click)="logOut()"
            class="flex items-center cursor-pointer gap-3 w-full p-4 rounded-xl text-red-600 hover:bg-red-50 font-bold">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
        </button>
        } @else {
        <div class="flex flex-col gap-3">
            <a routerLink="/login" (click)="closeDrawer()"
                class="flex items-center gap-3 w-full p-2 text-emerald-600 font-bold bg-emerald-50 rounded-full">
                <div class="bg-emerald-600 h-9 w-9 rounded-full flex items-center justify-center"><i
                        class="far fa-user text-white text-sm"></i></div> Sign In
            </a>
            <a routerLink="/register" (click)="closeDrawer()"
                class="flex items-center gap-3 w-full p-2 text-emerald-600 font-bold bg-emerald-50 rounded-full">
                <div class="bg-emerald-600 h-9 w-9 rounded-full flex items-center justify-center"><i
                        class="fas fa-user-plus text-white text-sm"></i></div> Sign Up
            </a>
        </div>
        }
    </div>

    <div class="mt-auto border-t border-gray-100 pt-4">
        <a routerLink="/contact" (click)="closeDrawer()" class="flex items-center gap-3">
            <div class="bg-green-100 h-10 w-10 rounded-full flex items-center justify-center text-green-600"><i
                    class="fas fa-headset"></i></div>
            <div>
                <div class="text-xs text-gray-500">Support</div>
                <div class="text-sm font-medium text-gray-800">24/7 Help</div>
            </div>
        </a>
    </div>
</div>

@if (isDrawerOpen()) {
<div (click)="closeDrawer()" class="fixed inset-0 z-90 bg-black/40 lg:hidden transition-opacity"></div>
}
